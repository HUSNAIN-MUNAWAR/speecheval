services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      SPEECHEVAL_DATABASE_URL: postgresql+psycopg://speecheval:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-speecheval}
      REDIS_URL: redis://redis:6379/0
      SPEECHEVAL_ARTIFACT_ROOT: /data/artifacts
      SPEECHEVAL_QUEUE_MODE: dramatiq
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - artifacts:/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/health\")"]
      interval: 5s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./backend
    command: ["dramatiq", "app.workers.tasks", "--processes", "1", "--threads", "1"]
    env_file:
      - .env
    environment:
      SPEECHEVAL_DATABASE_URL: postgresql+psycopg://speecheval:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-speecheval}
      REDIS_URL: redis://redis:6379/0
      SPEECHEVAL_ARTIFACT_ROOT: /data/artifacts
      SPEECHEVAL_QUEUE_MODE: dramatiq
    volumes:
      - ./backend:/app
      - artifacts:/data/artifacts
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-speecheval}
      POSTGRES_USER: ${POSTGRES_USER:-speecheval}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-speecheval} -d ${POSTGRES_DB:-speecheval}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    profiles:
      - object-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-please}
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data: {}
  artifacts: {}
