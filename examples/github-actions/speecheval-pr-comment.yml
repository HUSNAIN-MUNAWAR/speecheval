name: SpeechEval PR summary

on:
  workflow_run:
    workflows: [SpeechEval TTS regression]
    types: [completed]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download benchmark summary
        uses: actions/download-artifact@v4
        with:
          name: speecheval-regression-summary
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts

      - name: Publish summary when a pull request is associated
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pulls = context.payload.workflow_run.pull_requests || [];
            if (!pulls.length) {
              core.notice('No associated pull request; skipping comment.');
              return;
            }
            const body = fs.readFileSync('artifacts/speecheval-summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pulls[0].number,
              body,
            });
